<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso Administrativo – Boletos</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #1B3A6B 0%, #2563EB 60%, #0EA5E9 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }

  .login-card {
    background: white;
    border-radius: 20px;
    padding: 40px 36px;
    width: 100%; max-width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
    text-align: center;
  }

  .logo {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, #1B3A6B, #2563EB);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    margin: 0 auto 20px;
  }

  h1 { font-size: 1.25rem; font-weight: 700; color: #1B3A6B; margin-bottom: 6px; }
  .subtitle { font-size: .875rem; color: #64748b; margin-bottom: 28px; }

  .form-group { margin-bottom: 18px; text-align: left; }

  label {
    display: block;
    font-size: .8125rem; font-weight: 600;
    color: #374151; margin-bottom: 6px;
  }

  .input-wrap { position: relative; }

  input[type=password], input[type=text] {
    width: 100%;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    padding: 11px 42px 11px 14px;
    font-size: .9375rem;
    color: #1e293b;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
    font-family: inherit;
  }

  input:focus {
    border-color: #2563EB;
    box-shadow: 0 0 0 3px rgba(37,99,235,.13);
  }

  .toggle-eye {
    position: absolute; right: 12px; top: 50%;
    transform: translateY(-50%);
    cursor: pointer; user-select: none;
    font-size: 1rem; color: #94a3b8;
    background: none; border: none; padding: 0;
  }

  .btn-login {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #1B3A6B, #2563EB);
    color: white; border: none; border-radius: 9px;
    font-size: 1rem; font-weight: 600;
    cursor: pointer; margin-top: 4px;
    transition: opacity .2s, transform .1s;
    letter-spacing: .01em;
  }
  .btn-login:hover { opacity: .88; }
  .btn-login:active { transform: scale(.99); }
  .btn-login:disabled { opacity: .55; cursor: not-allowed; }

  .alert-error {
    background: #FEF2F2; color: #991B1B;
    border: 1px solid #FCA5A5;
    border-radius: 8px; padding: 10px 14px;
    font-size: .875rem; margin-top: 14px;
    display: none;
  }

  .back-link {
    display: block; margin-top: 20px;
    font-size: .8125rem; color: #64748b;
    text-decoration: none;
  }
  .back-link:hover { color: #1B3A6B; }
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">🔐</div>
  <h1>Área Administrativa</h1>
  <p class="subtitle">Acesso restrito — somente autorizado</p>

  <form id="loginForm">
    <div class="form-group">
      <label for="senha">Senha de acesso</label>
      <div class="input-wrap">
        <input type="password" id="senha" name="senha" placeholder="••••••••" required autocomplete="current-password">
        <button type="button" class="toggle-eye" id="toggleEye" title="Mostrar/ocultar">👁️</button>
      </div>
    </div>

    <button type="submit" class="btn-login" id="loginBtn">Entrar</button>
    <div class="alert-error" id="errorMsg"></div>
  </form>

  <a href="/" class="back-link">← Voltar à página de envio</a>
</div>

<script>
const form = document.getElementById('loginForm');
const btn  = document.getElementById('loginBtn');
const err  = document.getElementById('errorMsg');
const eye  = document.getElementById('toggleEye');
const senhaInput = document.getElementById('senha');

eye.addEventListener('click', () => {
  const isPass = senhaInput.type === 'password';
  senhaInput.type = isPass ? 'text' : 'password';
  eye.textContent = isPass ? '🙈' : '👁️';
});

form.addEventListener('submit', async e => {
  e.preventDefault();
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Verificando...';

  try {
    const res = await fetch('/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ senha: senhaInput.value })
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = '/admin';
    } else {
      err.textContent = data.message || 'Senha incorreta.';
      err.style.display = 'block';
      senhaInput.value = '';
      senhaInput.focus();
    }
  } catch {
    err.textContent = 'Erro de conexão. Tente novamente.';
    err.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
});
</script>
</body>
</html>
